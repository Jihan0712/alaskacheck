<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Alaska Pro Photo Booth</title>
  
  <!-- Google Fonts: Rubik -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet">
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    
    <!-- SCREEN 1: LANDING -->
    <section id="screen-landing" class="screen active">
      <div class="screen-inner landing-screen">
        <img src="assets/logo.png" alt="Alaska Pro logo" class="logo" />
        <img src="assets/landing-hero.png" alt="Chefs" class="hero-image" onerror="this.src='https://via.placeholder.com/350x450/1c3570/ffffff?text=Hero+Image'" />
        <button id="start-registration" class="primary-btn">
          <i class="fa-solid fa-camera"></i> Start Registration
        </button>
      </div>
    </section>

    <!-- SCREEN 2: PRIVACY MODAL -->
    <section id="screen-privacy" class="screen">
      <div class="screen-inner privacy-screen">
        <img src="assets/logo.png" alt="Alaska Pro logo" class="logo privacy-logo" />
        <div class="privacy-card">
          <p>By continuing, you agree to our <span class="policy-link">Privacy Policy</span> and consent to the use of your photo for this event.</p>
          <div class="button-row">
            <button id="accept-privacy" class="modal-primary-btn">ACCEPT</button>
            <button id="cancel-privacy" class="modal-secondary-btn">CANCEL</button>
          </div>
        </div>
      </div>
    </section>

    <!-- SCREEN 3: CAMERA -->
    <section id="screen-camera" class="screen">
      <div class="screen-inner camera-screen">
        <img src="assets/logo.png" alt="Alaska Pro logo" class="logo camera-logo" />
        <div class="camera-stage">
          <video id="camera-video" autoplay playsinline muted></video>
          <div class="crop-guide"></div>
          <div class="red-brackets"></div>
          <div id="quote-overlay" class="quote-overlay">I am pro.<br>I am Alaska Pro.</div>
        </div>
        <div class="capture-container">
          <button type="button" id="prev-quote" class="side-control-btn"><i class="fa-solid fa-chevron-left"></i></button>
          <button type="button" id="real-capture-btn" class="capture-btn"></button>
          <button type="button" id="next-quote" class="side-control-btn"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
    </section>

    <!-- SCREEN 4: PREVIEW -->
    <section id="screen-preview" class="screen">
      <div class="screen-inner preview-screen">
        <img src="assets/logo.png" alt="Alaska Pro logo" class="logo small-logo" />
        <canvas id="preview-canvas" class="preview-canvas"></canvas>
        <div class="button-row bottom-buttons">
          <button id="use-photo" class="primary-btn wide-btn">USE PHOTO</button>
          <button id="retake-photo" class="secondary-btn wide-btn">RETAKE</button>
          <a id="dl-link" href="#" class="download-link"><i class="fa-solid fa-download"></i> DOWNLOAD PHOTO</a>
        </div>
      </div>
    </section>

    <!-- SCREEN 5: FORM -->
    <section id="screen-form" class="screen">
      <div class="screen-inner form-screen">
        <img id="photo-thumb" class="photo-thumb" alt="Captured photo preview" />
        <form id="registration-form" novalidate>
          <input type="text" id="full-name" name="fullName" class="form-input" placeholder="Full Name" required />
          <input type="email" id="email" name="email" class="form-input" placeholder="Email Address" required />
          <input type="tel" id="phone" name="phone" class="form-input" placeholder="Phone Number" required />
          <input type="text" id="industry" name="industry" class="form-input" placeholder="Industry" required />
          <p id="form-error" class="error-text"></p>
          <div class="button-row">
            <button id="submit-form" class="primary-btn wide-btn" type="submit">SUBMIT</button>
            <button type="button" id="form-retake-btn" class="secondary-btn wide-btn">RETAKE</button>
          </div>
        </form>
      </div>
    </section>

    <!-- SCREEN 6: SUCCESS -->
    <section id="screen-success" class="screen">
      <div class="screen-inner success-screen">
        <img src="assets/logo.png" alt="Alaska Pro logo" class="logo small-logo" />
        <img id="final-image" class="final-image" alt="Final photo" />
        <div class="success-details">
          <p id="success-name" class="success-name">Rico Dizon</p>
          <p id="success-industry" class="success-industry">Alab Resto</p>
        </div>
        <p class="footer-notice">Show this screen to the organizer to get your free taste</p>
      </div>
    </section>

  </main>
  <script src="script.js"></script>
</body>
</html>
